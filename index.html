<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上大学投资回报率测试</title>
<style>
  :root {
    --bg: #f7f6f3;
    --card: #ffffff;
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --primary-light: #eef2ff;
    --text: #1e293b;
    --text-secondary: #64748b;
    --text-muted: #94a3b8;
    --border: #e8e5df;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
    --shadow: 0 4px 24px rgba(0,0,0,.06);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.08);
    --radius: 16px;
    --radius-sm: 10px;
    --transition: .25s cubic-bezier(.4,0,.2,1);
    --font: "PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Container ── */
  .app {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 36px 32px;
    transition: opacity var(--transition), transform var(--transition);
  }

  @media (max-width: 480px) {
    .card { padding: 28px 20px; }
  }

  /* ── Header ── */
  .header {
    text-align: center;
    padding-bottom: 8px;
  }
  .header .icon {
    font-size: 48px;
    margin-bottom: 8px;
    display: block;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: .02em;
    color: var(--text);
    margin-bottom: 6px;
  }
  .header .subtitle {
    font-size: 15px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  /* ── Progress ── */
  .progress-wrap {
    padding: 0 0 20px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .progress-bar {
    height: 6px;
    background: #e8e5df;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #818cf8, var(--primary));
    border-radius: 99px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }

  /* ── Question ── */
  .question-text {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.7;
    margin-bottom: 24px;
    color: var(--text);
  }
  @media (max-width: 480px) {
    .question-text { font-size: 16px; }
  }

  /* ── Options ── */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all var(--transition);
    background: var(--card);
    user-select: none;
  }
  .option:hover {
    border-color: #c7d2fe;
    background: #fafafe;
  }
  .option.selected {
    border-color: var(--primary);
    background: var(--primary-light);
  }
  .option .radio {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #d1d5db;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
  }
  .option.selected .radio {
    border-color: var(--primary);
    background: var(--primary);
  }
  .option.selected .radio::after {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #fff;
  }
  .option .label {
    font-size: 15px;
    color: var(--text);
    line-height: 1.5;
  }
  .option .letter {
    font-weight: 700;
    font-size: 13px;
    color: var(--text-muted);
    width: 22px;
    text-align: center;
    flex-shrink: 0;
  }
  .option.selected .letter {
    color: var(--primary);
  }

  /* ── Nav ── */
  .nav {
    display: flex;
    gap: 12px;
    margin-top: 28px;
  }
  .btn {
    flex: 1;
    padding: 13px 24px;
    border-radius: 99px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all var(--transition);
    font-family: var(--font);
    text-align: center;
    letter-spacing: .02em;
  }
  .btn-prev {
    background: #f1f5f9;
    color: var(--text-secondary);
    flex: 0 0 auto;
  }
  .btn-prev:hover { background: #e2e8f0; }
  .btn-prev:disabled { opacity: 0; pointer-events: none; }
  .btn-next {
    background: var(--primary);
    color: #fff;
    flex: 1;
  }
  .btn-next:hover { background: var(--primary-hover); }
  .btn-next:disabled {
    opacity: .35;
    pointer-events: none;
  }
  .btn-start {
    background: var(--primary);
    color: #fff;
    padding: 16px 40px;
    font-size: 17px;
    width: 100%;
  }
  .btn-start:hover { background: var(--primary-hover); }
  .btn-restart {
    background: #f1f5f9;
    color: var(--text);
    padding: 13px 32px;
    font-size: 14px;
    width: auto;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-restart:hover { background: #e2e8f0; }

  /* ── Intro ── */
  .intro .desc {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.8;
    margin-bottom: 28px;
    text-align: center;
  }
  .intro .meta {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .intro .meta-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
    background: #f8fafc;
    padding: 8px 14px;
    border-radius: 99px;
  }

  /* ── Result ── */
  .result { text-align: center; }
  .result .level {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 12px;
    letter-spacing: .02em;
  }
  .result .verdict {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.8;
    max-width: 420px;
    margin: 0 auto 32px;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
  }
  .footer a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
    transition: color var(--transition);
  }
  .footer a:hover { color: var(--primary-hover); }
  .footer .divider { margin: 0 8px; color: #d1d5db; }

  /* ── Fade ── */
  .fade-enter { animation: fadeIn .35s ease both; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Levels ── */
  .level-a { color: #059669; }
  .level-b { color: #2563eb; }
  .level-c { color: #d97706; }
  .level-d { color: #ea580c; }
  .level-e { color: #dc2626; }

</style>
</head>

  const app = document.getElementById('app');

  function getResult(index) {
    for (const r of resultLevels) {
      if (index >= r.min && index <= r.max) return r;
    }
    return resultLevels[resultLevels.length - 1];
  }

  function calcIndex() {
    const total = answers.reduce((sum, s) => sum + (s >= 0 ? s : 0), 0);
    return Math.round((total / MAX_SCORE) * 100);
  }

  /* ── Render ── */
  function render() {
    if (phaseShowing === 'intro') return renderIntro();
    if (phaseShowing === 'quiz') return renderQuiz();
    if (phaseShowing === 'result') return renderResult();

  function renderIntro() {
    app.innerHTML = `
      <div class="card intro fade-enter">

        </div>
        <p class="desc">
          本测试包含 <strong>${TOTAL} 道选择题</strong>，请根据你的真实想法或情况选择最接近的选项。<br>
          最终的评估反映了就读大学对你个人的划算程度。
        </p>
        <div class="meta">
          <span class="meta-item">📝 ${TOTAL} 题</span>
          <span class="meta-item">⏱ 约 3 分钟</span>
          <span class="meta-item">🔒 结果不公开</span>
        </div>
        <button class="btn btn-start" id="btnStart">开始测试</button>
      </div>
    `;
    document.getElementById('btnStart').addEventListener('click', () => {
      phaseShowing = 'quiz';
      current = 1;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  function renderQuiz() {
    const idx = current - 1; // 0-based
    const q = questions[idx];
    const selected = answers[idx];
    const progressPct = Math.round((current / TOTAL) * 100);

    let optionsHTML = q.options.map((opt, oi) => {
      const sel = selected === opt.score ? ' selected' : '';
      return `
        <div class="option${sel}" data-score="${opt.score}">
          <span class="letter">${opt.letter}</span>
          <span class="label">${opt.text}</span>
          <span class="radio"></span>
        </div>`;
    }).join('');

    app.innerHTML = `
      <div class="card fade-enter">
        <div class="progress-wrap">
          <div class="progress-info">
            <span>第 ${current} / ${TOTAL} 题</span>
            <span>${progressPct}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${progressPct}%"></div>
          </div>
        </div>
        <div class="question-text">${q.q}</div>
        <div class="options">${optionsHTML}</div>
        <div class="nav">
          <button class="btn btn-prev" id="btnPrev"${current === 1 ? ' disabled' : ''}>← 上一题</button>
          <button class="btn btn-next" id="btnNext"${selected < 0 ? ' disabled' : ''}>
            ${current === TOTAL ? '查看结果' : '下一题 →'}
          </button>
        </div>
      </div>
    `;

    // Bind option clicks
    document.querySelectorAll('.option').forEach(el => {
      el.addEventListener('click', function() {
        const score = parseInt(this.dataset.score);
        answers[idx] = score;
        renderQuiz(); // re-render to show selection + enable next
      });
    });

    // Bind nav
    document.getElementById('btnPrev').addEventListener('click', () => {
      if (current > 1) { current--; renderQuiz(); }
    });
    document.getElementById('btnNext').addEventListener('click', () => {
      if (selected < 0) return;
      if (current === TOTAL) {
        phaseShowing = 'result';
        render();
      } else {
        current++;
        renderQuiz();
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  function renderResult() {
    const index = calcIndex();
    const result = getResult(index);

    app.innerHTML = `
      <div class="card result fade-enter">
        <div class="header">
          <span class="icon">${result.emoji}</span>
          <h1>你的大学投资回报率评估</h1>
        </div>
        <div class="level level-${result.cls}">${result.level}</div>
        <p class="verdict">${result.desc}</p>
        <button class="btn btn-restart" id="btnRestart">
          ↻ 重新测试
        </button>
      </div>
    `;

    document.getElementById('btnRestart').addEventListener('click', () => {
      answers = new Array(TOTAL).fill(-1);
      current = 0;
      phaseShowing = 'intro';
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  // ── Boot ──
  render();

})();
</script>

</body>
</html>
